networks:
  lan13:
    name: lan13
    driver: macvlan
    driver_opts:
      parent: eth1
    ipam:
      config:
        - subnet: "192.168.13.0/24"
          gateway: "192.168.13.254"
  bitmagnet-network:

services:
  bitmagnet:
    container_name: "bitmagnet"
    hostname: "bitmagnet"
    image: ghcr.io/bitmagnet-io/bitmagnet:latest
    ports:
      # API and WebUI port:
      - "3333:3333"
      # BitTorrent ports:
      - "3334:3334/tcp"
      - "3334:3334/udp"
    restart: unless-stopped
    cap_add:
      - "NET_BIND_SERVICE"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PASSWORD=postgres
    #      - TMDB_API_KEY=your_api_key
    command:
      - worker
      - run
      - --keys=http_server
      - --keys=queue_server
      # disable the next line to run without DHT crawler
      - --keys=dht_crawler
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - "./bitmagnet:/root/.config/bitmagnet"
    networks:
      lan13:
        ipv4_address: 192.168.13.168
      bitmagnet-network:
  postgres:
    image: docker.io/postgres:16-alpine
    container_name: bitmagnet-postgres
    volumes:
      - ./pgdb:/var/lib/postgresql/data
    cap_add:
      - "NET_BIND_SERVICE"
    ports:
      - "5432:5432" #Expose this port if you'd like to dig around in the database
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=bitmagnet
      - PGUSER=postgres
    shm_size: 1g
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready
      start_period: 20s
      interval: 10s
    networks:
      bitmagnet-network:
