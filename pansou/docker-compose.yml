      - NET_ADMIN
    image: ghcr.io/fish2018/pansou-web:latest
    restart: unless-stopped
    volumes:
      - "pansou-dat:/app/data"
    networks:
      pansou-net:
      lan12:
        ipv4_address: 192.168.12.66
